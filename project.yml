name: DopamineDetox
options:
  bundleIdPrefix: com.cheddarlebel
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

schemes:
  DopamineDetox:
    build:
      targets:
        DopamineDetox: all
        DopamineDetoxMonitor: all
        DopamineDetoxShield: all
        DopamineDetoxWidget: all
    test:
      targets:
        - DopamineDetoxTests
        - DopamineDetoxUITests
      gatherCoverageData: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "465YNNXPJ4"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.1

targets:
  DopamineDetox:
    type: application
    platform: iOS
    sources:
      - path: DopamineDetox
        excludes:
          - "Info.plist"
          - "DopamineDetox.entitlements"
      - path: Shared
    info:
      path: DopamineDetox/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: false
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: Last Scroll
        ITSAppUsesNonExemptEncryption: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cheddarlebel.dopaminedetox
        CODE_SIGN_ENTITLEMENTS: DopamineDetox/DopamineDetox.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SUPABASE_URL: https://YOUR_PROJECT.supabase.co
        SUPABASE_ANON_KEY: REPLACE_ME
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: LastScroll Dev main
    dependencies:
      - target: DopamineDetoxMonitor
        embed: true
      - target: DopamineDetoxShield
        embed: true
      - target: DopamineDetoxWidget
        embed: true
      - package: Supabase
        product: Supabase

  DopamineDetoxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DopamineDetoxTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cheddarlebel.dopaminedetox.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DopamineDetox

  DopamineDetoxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DopamineDetoxUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cheddarlebel.dopaminedetox.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DopamineDetox
    dependencies:
      - target: DopamineDetox

  DopamineDetoxMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: DopamineDetoxMonitor
        excludes:
          - "Info.plist"
          - "DopamineDetoxMonitor.entitlements"
      - path: Shared
    info:
      path: DopamineDetoxMonitor/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DopamineDetoxMonitor
        CFBundleDisplayName: Last Scroll Monitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cheddarlebel.dopaminedetox.monitor
        CODE_SIGN_ENTITLEMENTS: DopamineDetoxMonitor/DopamineDetoxMonitor.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: LastScroll Dev monitor

  DopamineDetoxShield:
    type: app-extension
    platform: iOS
    sources:
      - path: DopamineDetoxShield
        excludes:
          - "Info.plist"
          - "DopamineDetoxShield.entitlements"
      - path: Shared
    info:
      path: DopamineDetoxShield/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DopamineDetoxShield
        CFBundleDisplayName: Last Scroll Shield
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cheddarlebel.dopaminedetox.shield
        CODE_SIGN_ENTITLEMENTS: DopamineDetoxShield/DopamineDetoxShield.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: LastScroll Dev shield

  DopamineDetoxWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DopamineDetoxWidget
        excludes:
          - "Info.plist"
          - "DopamineDetoxWidget.entitlements"
      - path: Shared
    info:
      path: DopamineDetoxWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleDisplayName: Last Scroll Widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cheddarlebel.dopaminedetox.widget
        CODE_SIGN_ENTITLEMENTS: DopamineDetoxWidget/DopamineDetoxWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: LastScroll Dev widget
