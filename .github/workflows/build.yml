name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep -i ios || true
          xcrun simctl list devices available | grep -i iphone | head -5 || true

      - name: Install xcodegen
        run: brew install xcodegen xcbeautify

      - name: Generate project
        run: xcodegen generate

      - name: Pick simulator destination
        id: dest
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E 'iPhone 1[5-9]( Pro)?( \(' | grep -v 'Plus\|Max\|mini\|Air' | head -1 | sed -E 's/^[[:space:]]+([^(]+).*/\1/' | xargs)
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -E 'iPhone' | head -1 | sed -E 's/^[[:space:]]+([^(]+).*/\1/' | xargs)
          fi
          echo "Using device: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Resolve packages
        run: |
          xcodebuild \
            -project DopamineDetox.xcodeproj \
            -scheme DopamineDetox \
            -destination 'generic/platform=iOS Simulator' \
            -resolvePackageDependencies

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project DopamineDetox.xcodeproj \
            -scheme DopamineDetox \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.device }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project DopamineDetox.xcodeproj \
            -scheme DopamineDetox \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.device }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify --renderer github-actions
